server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 처리 - URL 유지하면서 index.html 서빙
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱 (성능 최적화)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안: 숨김 파일 접근 차단
    location ~ /\. {
        deny all;
        return 404;
    }
}